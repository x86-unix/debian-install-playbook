---
- name: Install Debian sid via debootstrap
  hosts: target
  gather_facts: false

  environment:
    PATH: /usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
    DEBIAN_FRONTEND: noninteractive

  tasks:
    - name: Install debootstrap
      shell: pacman -Sy --noconfirm debootstrap
      args:
        creates: /usr/bin/debootstrap

    - name: Mount root partition
      shell: mkdir -p {{ chroot_dir }} && mount {{ root_partition }} {{ chroot_dir }}

    - name: Mount EFI partition
      shell: mkdir -p {{ chroot_dir }}/boot/efi && mount {{ efi_partition }} {{ chroot_dir }}/boot/efi

    - name: Run debootstrap
      shell: debootstrap --arch=amd64 {{ debian_suite }} {{ chroot_dir }} {{ debian_mirror }}
      args:
        creates: "{{ chroot_dir }}/bin/bash"
      async: 1800
      poll: 30

    - name: Write fstab
      copy:
        dest: "{{ chroot_dir }}/etc/fstab"
        content: |
          {{ root_partition }}  /         ext4  errors=remount-ro  0  1
          {{ efi_partition }}   /boot/efi vfat  umask=0077         0  1

    - name: Set hostname
      copy:
        dest: "{{ chroot_dir }}/etc/hostname"
        content: "{{ hostname }}\n"

    - name: Set /etc/hosts
      copy:
        dest: "{{ chroot_dir }}/etc/hosts"
        content: |
          127.0.0.1   localhost
          127.0.1.1   {{ hostname }}

    - name: Write sources.list
      copy:
        dest: "{{ chroot_dir }}/etc/apt/sources.list"
        content: |
          deb {{ debian_mirror }} {{ debian_suite }} main contrib non-free non-free-firmware

    - name: Bind mount dev/proc/sys
      shell: |
        mount --bind /dev  {{ chroot_dir }}/dev
        mount --bind /proc {{ chroot_dir }}/proc
        mount --bind /sys  {{ chroot_dir }}/sys

    - name: Set timezone
      shell: |
        chroot {{ chroot_dir }} ln -sf /usr/share/zoneinfo/{{ timezone }} /etc/localtime
        echo '{{ timezone }}' > {{ chroot_dir }}/etc/timezone

    - name: apt-get update
      shell: chroot {{ chroot_dir }} apt-get update

    - name: Install kernel and base packages
      shell: |
        chroot {{ chroot_dir }} apt-get install -y \
          linux-image-amd64 \
          grub-efi-amd64 \
          efibootmgr \
          systemd-sysv \
          network-manager \
          openssh-server \
          locales \
          sudo \
          vim
      async: 1800
      poll: 30

    - name: Set locale
      shell: |
        sed -i 's/^# *{{ locale }} UTF-8/{{ locale }} UTF-8/' {{ chroot_dir }}/etc/locale.gen
        chroot {{ chroot_dir }} locale-gen
        echo 'LANG={{ locale }}' > {{ chroot_dir }}/etc/default/locale

    - name: Set root password
      shell: chroot {{ chroot_dir }} bash -c "echo 'root:{{ root_password }}' | chpasswd"

    - name: Install GRUB
      shell: |
        chroot {{ chroot_dir }} grub-install --target=x86_64-efi --efi-directory=/boot/efi --bootloader-id=debian
        chroot {{ chroot_dir }} update-grub
      async: 300
      poll: 15

    - name: Enable SSH
      shell: chroot {{ chroot_dir }} systemctl enable ssh

    - name: Unmount chroot
      shell: |
        umount {{ chroot_dir }}/dev  || true
        umount {{ chroot_dir }}/proc || true
        umount {{ chroot_dir }}/sys  || true
        umount {{ chroot_dir }}/boot/efi
        umount {{ chroot_dir }}
