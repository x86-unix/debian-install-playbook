---
# Extended setup - run AFTER base install and reboot
# Usage: ansible-playbook -i inventory.ini site-extra.yml --ask-pass
#
# Prerequisites: Base system booted from site-base.yml

- name: Pre-flight check
  hosts: target
  gather_facts: false
  tasks:
    - name: Check vault availability
      set_fact:
        _vault_check: "{{ wifi_password | default('') }}"
      ignore_errors: true
      register: vault_result
      no_log: true

    - name: Abort if vault is not available
      fail:
        msg: |
          vault が有効になっていません。この playbook は vault 必須です。
          実行例: ansible-playbook -i inventory.ini site-extra.yml --vault-password-file .vault_pass
      when: vault_result is failed

- name: Import account
  ansible.builtin.import_playbook: extra/extra-account.yml

- name: Import services
  ansible.builtin.import_playbook: extra/extra-services.yml

- name: Import CLI tools
  ansible.builtin.import_playbook: extra/extra-cli-tools.yml

- name: Import sound
  ansible.builtin.import_playbook: extra/extra-sound.yml

- name: Import bluetooth
  ansible.builtin.import_playbook: extra/extra-bluetooth.yml

- name: Import wayland desktop
  ansible.builtin.import_playbook: extra/extra-wayland.yml

- name: Import IME
  ansible.builtin.import_playbook: extra/extra-ime.yml

- name: Import remote desktop
  ansible.builtin.import_playbook: extra/extra-remote-desktop.yml

- name: Import GUI tools
  ansible.builtin.import_playbook: extra/extra-gui-tools.yml
