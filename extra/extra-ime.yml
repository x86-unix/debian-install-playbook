---
# Install fcitx5 + IME engine
# ime_engine: "skk" (default) or "mozc"

- name: "Extra: IME (fcitx5)"
  hosts: target
  gather_facts: false

  tasks:
    - name: Install fcitx5 base
      ansible.builtin.apt:
        name:
          - fcitx5
          - fcitx5-config-qt
          - fcitx5-frontend-gtk3
          - fcitx5-frontend-gtk4
          - fcitx5-frontend-qt6
        state: present
        update_cache: true

    - name: Install fcitx5-skk
      ansible.builtin.apt:
        name:
          - fcitx5-skk
          - skkdic
        state: present
      when: (ime_engine | default('skk')) == 'skk'

    - name: Install fcitx5-mozc (Google IME)
      ansible.builtin.apt:
        name:
          - fcitx5-mozc
        state: present
      when: (ime_engine | default('skk')) == 'mozc'

    - name: Configure fcitx5 environment
      ansible.builtin.copy:
        dest: /etc/environment.d/90-fcitx5.conf
        mode: "0644"
        content: |
          GTK_IM_MODULE=fcitx
          QT_IM_MODULE=fcitx
          XMODIFIERS=@im=fcitx
          SDL_IM_MODULE=fcitx
