---
- name: Install Debian sid via debootstrap
  hosts: target
  gather_facts: false

  environment:
    PATH: /usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
    DEBIAN_FRONTEND: noninteractive

  tasks:
    - name: Check vault availability
      set_fact:
        _vault_check: "{{ wifi_password | default('') }}"
      ignore_errors: true
      register: vault_result
      no_log: true

    - name: Abort if vault is not available
      fail:
        msg: |
          vault が有効になっていません。この playbook は vault 必須です。
          実行例: ansible-playbook -i inventory.ini site-base.yml --vault-password-file .vault_pass
      when: vault_result is failed

    - name: Install debootstrap
      shell: pacman -Sy --noconfirm debootstrap
      args:
        creates: /usr/bin/debootstrap

    - name: Detect boot mode (UEFI or BIOS)
      shell: "[ -d /sys/firmware/efi ] && echo uefi || echo bios"
      register: boot_mode_detected
      changed_when: false

    - name: Confirm boot mode
      pause:
        prompt: "ブートモード自動検出: {{ boot_mode_detected.stdout | upper }}。変更する場合は 'uefi' または 'bios' を入力してください（Enter でそのまま）"
      register: boot_mode_input

    - name: Set boot mode
      set_fact:
        boot_mode: "{{ boot_mode_input.user_input if boot_mode_input.user_input in ['uefi', 'bios'] else boot_mode_detected.stdout }}"

    - name: Show current disk layout
      shell: "lsblk -o NAME,SIZE,TYPE,FSTYPE,LABEL {{ target_disk }}"
      register: disk_layout
      changed_when: false

    - name: Display disk layout and boot mode
      debug:
        msg: "{{ boot_mode | upper }} モード\n{{ disk_layout.stdout }}"

    - name: Confirm disk partitioning
      pause:
        prompt: "{{ target_disk }} を完全に消去してパーティションを作成します。実行する場合は 'yes' を入力してください（デフォルト: no）"
      register: confirm_partition

    - name: Create GPT partitions (UEFI)
      shell: |
        umount {{ target_disk }}* 2>/dev/null || true
        sgdisk --zap-all {{ target_disk }}
        sgdisk -n 1:0:+512M -t 1:ef00 -c 1:EFI {{ target_disk }}
        sgdisk -n 2:0:0 -t 2:8300 -c 2:root {{ target_disk }}
        partprobe {{ target_disk }}
        sleep 2
      when: confirm_partition.user_input == 'yes' and boot_mode == 'uefi'

    - name: Create GPT partitions (BIOS)
      shell: |
        umount {{ target_disk }}* 2>/dev/null || true
        sgdisk --zap-all {{ target_disk }}
        sgdisk -n 1:0:+1M -t 1:ef02 -c 1:BIOS {{ target_disk }}
        sgdisk -n 2:0:0 -t 2:8300 -c 2:root {{ target_disk }}
        partprobe {{ target_disk }}
        sleep 2
      when: confirm_partition.user_input == 'yes' and boot_mode == 'bios'

    - name: Set partition variables (UEFI)
      set_fact:
        efi_partition: "{{ target_disk }}1"
        root_partition: "{{ target_disk }}2"
      when: boot_mode == 'uefi'

    - name: Set partition variables (BIOS)
      set_fact:
        root_partition: "{{ target_disk }}2"
      when: boot_mode == 'bios'

    - name: Unmount target partitions
      shell: |
        umount -l {{ chroot_dir }}/boot/efi 2>/dev/null || true
        umount -l {{ chroot_dir }} 2>/dev/null || true
        umount -l {{ target_disk }}2 2>/dev/null || true
        umount -l {{ target_disk }}1 2>/dev/null || true
      when: confirm_partition.user_input == 'yes'

    - name: Format EFI partition
      shell: mkfs.vfat -F 32 {{ efi_partition }}
      when: confirm_partition.user_input == 'yes' and boot_mode == 'uefi'

    - name: Format root partition
      shell: mkfs.ext4 -F {{ root_partition }}
      when: confirm_partition.user_input == 'yes'

    - name: Mount root partition
      shell: mkdir -p {{ chroot_dir }} && mount {{ root_partition }} {{ chroot_dir }}

    - name: Mount EFI partition
      shell: mkdir -p {{ chroot_dir }}/boot/efi && mount {{ efi_partition }} {{ chroot_dir }}/boot/efi
      when: boot_mode == 'uefi'

    - name: Run debootstrap
      shell: debootstrap --arch=amd64 {{ debian_suite }} {{ chroot_dir }} {{ debian_mirror }}
      args:
        creates: "{{ chroot_dir }}/bin/bash"
      async: 1800
      poll: 30

    - name: Write fstab (UEFI)
      copy:
        dest: "{{ chroot_dir }}/etc/fstab"
        content: |
          {{ root_partition }}  /         ext4  errors=remount-ro  0  1
          {{ efi_partition }}   /boot/efi vfat  umask=0077         0  1
      when: boot_mode == 'uefi'

    - name: Write fstab (BIOS)
      copy:
        dest: "{{ chroot_dir }}/etc/fstab"
        content: |
          {{ root_partition }}  /  ext4  errors=remount-ro  0  1
      when: boot_mode == 'bios'

    - name: Set hostname
      copy:
        dest: "{{ chroot_dir }}/etc/hostname"
        content: "{{ hostname }}\n"

    - name: Set /etc/hosts
      copy:
        dest: "{{ chroot_dir }}/etc/hosts"
        content: |
          127.0.0.1   localhost
          127.0.1.1   {{ hostname }}

    - name: Write sources.list
      copy:
        dest: "{{ chroot_dir }}/etc/apt/sources.list"
        content: |
          deb {{ debian_mirror }} {{ debian_suite }} main contrib non-free non-free-firmware

    - name: Bind mount dev/proc/sys
      shell: |
        mount --bind /dev  {{ chroot_dir }}/dev
        mount --bind /proc {{ chroot_dir }}/proc
        mount --bind /sys  {{ chroot_dir }}/sys

    - name: Set timezone
      shell: |
        chroot {{ chroot_dir }} ln -sf /usr/share/zoneinfo/{{ timezone }} /etc/localtime
        echo '{{ timezone }}' > {{ chroot_dir }}/etc/timezone

    - name: apt-get update
      shell: chroot {{ chroot_dir }} apt-get update

    - name: Install kernel and base packages
      shell: |
        chroot {{ chroot_dir }} apt-get install -y \
          linux-image-amd64 \
          {{ 'grub-efi-amd64 efibootmgr' if boot_mode == 'uefi' else 'grub-pc' }} \
          systemd-sysv \
          network-manager \
          openssh-server \
          locales \
          sudo \
          vim \
          bash-completion \
          curl \
          wget \
          net-tools \
          netcat-openbsd \
          iputils-ping \
          iproute2 \
          dnsutils \
          tcpdump \
          rsync \
          less \
          man-db \
          htop \
          firmware-linux \
          firmware-iwlwifi
      async: 1800
      poll: 30

    - name: Set locale
      shell: |
        sed -i 's/^# *{{ locale }} UTF-8/{{ locale }} UTF-8/' {{ chroot_dir }}/etc/locale.gen
        chroot {{ chroot_dir }} locale-gen
        echo 'LANG={{ locale }}' > {{ chroot_dir }}/etc/default/locale

    - name: Set root password
      shell: chroot {{ chroot_dir }} bash -c "echo 'root:{{ root_password }}' | chpasswd"

    - name: Install GRUB (UEFI)
      shell: |
        chroot {{ chroot_dir }} grub-install --target=x86_64-efi --efi-directory=/boot/efi --bootloader-id=debian
        chroot {{ chroot_dir }} update-grub
      async: 300
      poll: 15
      when: boot_mode == 'uefi'

    - name: Install GRUB (BIOS)
      shell: |
        chroot {{ chroot_dir }} grub-install --target=i386-pc {{ target_disk }}
        chroot {{ chroot_dir }} update-grub
      async: 300
      poll: 15
      when: boot_mode == 'bios'

    - name: Detect wired interface
      shell: "ip -o link show | awk -F': ' '/^[0-9]+: e/{print $2}' | head -1"
      register: detected_wired
      changed_when: false

    - name: Configure wired (NetworkManager)
      shell: |
        mkdir -p {{ chroot_dir }}/etc/NetworkManager/system-connections
        printf '[connection]\nid=wired\ntype=ethernet\ninterface-name={{ detected_wired.stdout }}\n\n[ipv4]\nmethod=auto\n\n[ipv6]\naddr-gen-mode=default\nmethod=auto\n' \
          > {{ chroot_dir }}/etc/NetworkManager/system-connections/wired.nmconnection
        chmod 600 {{ chroot_dir }}/etc/NetworkManager/system-connections/wired.nmconnection
      when: detected_wired.stdout != ''

    - name: Detect WiFi interface
      shell: iw dev | awk '/Interface/{print $2}' | head -1
      register: detected_wifi
      changed_when: false

    - name: Configure WiFi (NetworkManager)
      shell: |
        mkdir -p {{ chroot_dir }}/etc/NetworkManager/system-connections
        printf '[connection]\nid={{ wifi_ssid }}\ntype=wifi\ninterface-name={{ detected_wifi.stdout }}\n\n[wifi]\nmode=infrastructure\nssid={{ wifi_ssid }}\n\n[wifi-security]\nauth-alg=open\nkey-mgmt=wpa-psk\npsk={{ wifi_password }}\n\n[ipv4]\nmethod=auto\n\n[ipv6]\naddr-gen-mode=default\nmethod=auto\n' \
          > {{ chroot_dir }}/etc/NetworkManager/system-connections/{{ wifi_ssid }}.nmconnection
        chmod 600 {{ chroot_dir }}/etc/NetworkManager/system-connections/{{ wifi_ssid }}.nmconnection
      when: detected_wifi.stdout != ''

    - name: Enable NetworkManager
      shell: chroot {{ chroot_dir }} systemctl enable NetworkManager

    - name: Allow SSH root login with password
      shell: |
        sed -i 's/^#*PermitRootLogin.*/PermitRootLogin yes/' {{ chroot_dir }}/etc/ssh/sshd_config
        grep -q '^PermitRootLogin' {{ chroot_dir }}/etc/ssh/sshd_config || echo 'PermitRootLogin yes' >> {{ chroot_dir }}/etc/ssh/sshd_config

    - name: Enable SSH
      shell: chroot {{ chroot_dir }} systemctl enable ssh

    - name: Unmount chroot
      shell: |
        umount {{ chroot_dir }}/dev  || true
        umount {{ chroot_dir }}/proc || true
        umount {{ chroot_dir }}/sys  || true
        umount {{ chroot_dir }}/boot/efi 2>/dev/null || true
        umount {{ chroot_dir }}
